name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPER_URL: ${{ secrets.SCRAPER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cat > deploy/.env.production << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SCRAPER_URL=${{ secrets.SCRAPER_URL }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          WEBSHARE_API_KEY=${{ secrets.WEBSHARE_API_KEY }}
          EOF

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: 147.79.96.85
          username: u622361615.outreach.sequenceflow.io
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: ./deploy/*
          remote_path: /home/u622361615/domains/outreach.sequenceflow.io/public_html
          sftp_only: true
          port: 65002
