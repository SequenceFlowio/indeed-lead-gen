name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPER_URL: ${{ secrets.SCRAPER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir -p deploy/.next
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cat > deploy/.env.production << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SCRAPER_URL=${{ secrets.SCRAPER_URL }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          WEBSHARE_API_KEY=${{ secrets.WEBSHARE_API_KEY }}
          EOF

      - name: Upload via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 147.79.96.85 >> ~/.ssh/known_hosts
          rsync -avz --delete -e "ssh -p 65002 -i ~/.ssh/id_ed25519" \
            ./deploy/ \
            u622361615@147.79.96.85:/home/u622361615/domains/outreach.sequenceflow.io/public_html/

      - name: Restart app via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.79.96.85
          username: u622361615
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            export PATH=/opt/alt/alt-nodejs24/root/usr/bin:$PATH
            cd /home/u622361615/domains/outreach.sequenceflow.io/public_html
            kill $(lsof -t -i:3000) 2>/dev/null || true
            nohup node server.js > app.log 2>&1 &
