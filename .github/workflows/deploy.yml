name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPER_URL: ${{ secrets.SCRAPER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
        run: npx next build

      - name: Push prebuilt to hostinger-deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B hostinger-deploy
          cp .gitignore .gitignore.bak
          echo '' > .gitignore
          git add -f .next/standalone/
          git add -f .next/static/
          git add package.json next.config.ts
          mv .gitignore.bak .gitignore
          git commit -m "Deploy prebuilt [skip ci]"
          git push origin hostinger-deploy --force

      - name: Write env file via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 -T 10 147.79.96.85 >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' \
            "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            "SCRAPER_URL=${{ secrets.SCRAPER_URL }}" \
            "CRON_SECRET=${{ secrets.CRON_SECRET }}" \
            "WEBSHARE_API_KEY=${{ secrets.WEBSHARE_API_KEY }}" \
            > /tmp/.env.production
          scp -P 65002 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no /tmp/.env.production u622361615@147.79.96.85:/home/u622361615/domains/outreach.sequenceflow.io/nodejs/.env.production
